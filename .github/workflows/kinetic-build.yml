name: Kinetic Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json
          npm ci --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Build production PWA
        run: npm run build
      - name: Normalize release metadata
        run: cp public/manifest.webmanifest dist/manifest.webmanifest
      - name: List production output
        run: find dist -maxdepth 3 -type f -printf '%P\n' | sort
      - name: Verify compiled assets
        run: |
          find dist/assets -maxdepth 1 -type f -name '*.js' | grep -q .
          find dist/assets -maxdepth 1 -type f -name '*.css' | grep -q .
          test -f dist/sw.js
      - name: Verify privacy-safe manifest
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const manifest = JSON.parse(fs.readFileSync('dist/manifest.webmanifest', 'utf8'))
          if (manifest.description !== 'Private strength, cardio, recovery, coaching and partner accountability.') throw new Error('Unexpected manifest description')
          if (manifest.short_name !== 'Kinetic') throw new Error('Unexpected app name')
          if (!Array.isArray(manifest.icons) || manifest.icons.length < 3) throw new Error('Missing install icons')
          NODE
      - name: Verify no credentials or private bootstrap data in release
        run: |
          if grep -R -E 'myer\.khalid@gmail\.com|yusmakhan99@gmail\.com|4trUyzzsDl0b0mE7|JSjso2cDW2tkbSz6' dist --include='*.html' --include='*.js' --include='*.css' --include='*.json' --include='*.webmanifest'; then
            echo 'Private account bootstrap data found in release.' >&2
            exit 1
          fi
      - name: Create release manifest
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          import path from 'node:path'
          const allowed = new Set(['.html', '.js', '.css', '.json', '.svg', '.png', '.webmanifest', '.txt'])
          const walk = (dir, prefix = '') => fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
            const rel = path.posix.join(prefix, entry.name)
            return entry.isDirectory() ? walk(path.join(dir, entry.name), rel) : allowed.has(path.extname(entry.name)) ? [rel] : []
          })
          const files = walk('dist').sort()
          fs.writeFileSync('dist/release-manifest.json', JSON.stringify({ commit: process.env.GITHUB_SHA, files }, null, 2))
          NODE
      - name: Upload verified release
        uses: actions/upload-artifact@v4
        with:
          name: kinetic-dist
          path: dist
          if-no-files-found: error
